name: bpl_auction
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  audioplayers: ^6.6.0
  cloud_firestore: ^6.1.3
  confetti: ^0.8.0
  firebase_auth: ^6.1.0
  firebase_core: ^4.5.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.2.1
  google_fonts: ^8.0.2
  path_provider: ^2.1.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: assets/app_logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
